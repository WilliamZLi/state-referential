<div class="strk-world-view">
  <div class="strk-wv-section">
    <div class="strk-wv-field">
      <label class="strk-wv-label">Name</label>
      <input type="text" class="text_pole" id="strk-wv-name" />
    </div>
    <div id="strk-wv-info" class="strk-wv-info"></div>
  </div>

  <div class="strk-wv-section">
    <h4 class="strk-wv-heading">Chronicle</h4>
    <div class="strk-wv-grid">
      <div class="strk-wv-field">
        <label class="strk-wv-label" title="Number of recent acts shown verbatim in the prompt. Older acts get folded into the big picture.">Verbatim window</label>
        <input type="number" class="text_pole" id="strk-chron-window" min="1" value="5" style="width:60px" />
      </div>
      <div class="strk-wv-field">
        <label class="strk-wv-label" title="lazy: fold oldest when window overflows. eager: regenerate after every act. manual: never auto-update.">Update strategy</label>
        <select class="text_pole" id="strk-chron-strategy" style="width:120px">
          <option value="lazy">lazy</option>
          <option value="eager">eager</option>
          <option value="manual">manual</option>
        </select>
      </div>
      <div class="strk-wv-field">
        <label class="strk-wv-label" title="Target length in tokens for the big picture summary. Longer = more detail but more prompt space used.">Big picture token cap</label>
        <input type="number" class="text_pole" id="strk-chron-bp-cap" min="50" value="300" style="width:70px" />
      </div>
      <div class="strk-wv-field">
        <label class="strk-wv-label" title="Target length in tokens for each individual act summary. Longer = more detail per act.">Entry token cap</label>
        <input type="number" class="text_pole" id="strk-chron-entry-cap" min="50" value="200" style="width:70px" />
      </div>
    </div>
    <div class="strk-drawer-actions">
      <button class="menu_button" id="strk-chron-save-config">Save config</button>
      <button class="menu_button" id="strk-chron-refresh-bp">Regenerate big picture</button>
    </div>
  </div>

  <div class="strk-wv-section">
    <h4 class="strk-wv-heading">Big picture</h4>
    <div id="strk-wv-bigpicture" class="strk-prose-display"></div>
  </div>

  <div class="strk-wv-section">
    <h4 class="strk-wv-heading">Acts</h4>
    <div id="strk-wv-entries"></div>
  </div>

  <div class="strk-drawer-actions" style="margin-top:12px">
    <button class="menu_button" id="strk-wv-save">Save</button>
    <button class="menu_button" id="strk-wv-export">Export JSON</button>
    <button class="menu_button" id="strk-wv-close">Close</button>
  </div>
</div>
