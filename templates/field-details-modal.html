<div class="strk-field-details">
  <h4 class="strk-field-details-title">Field details</h4>

  <!-- Type-specific section -->
  <div class="strk-fdet-section">
    <h5>Type-specific</h5>
    <label class="strk-fdet-row" title="Default value used when a new subject is added. For number fields use a numeric value; for list fields use comma-separated entries.">
      <span>Default</span>
      <input type="text" class="text_pole strk-fdet-default-text" />
      <input type="number" class="text_pole strk-fdet-default-number strk-hidden" />
    </label>
    <label class="strk-fdet-row strk-fdet-enum-only" title="Allowed values for this enum field. Enter one option per line.">
      <span>Options (one per line)</span>
      <textarea class="text_pole strk-fdet-options" rows="4"></textarea>
    </label>
    <label class="strk-fdet-row strk-fdet-number-only" title="Minimum allowed value for this number field (inclusive).">
      <span>Min</span>
      <input type="number" class="text_pole strk-fdet-min" />
    </label>
    <label class="strk-fdet-row strk-fdet-number-only" title="Maximum allowed value for this number field (inclusive).">
      <span>Max</span>
      <input type="number" class="text_pole strk-fdet-max" />
    </label>
    <label class="strk-fdet-row strk-fdet-number-only" title="Increment step for the number field. Used for DELTA commands (±step). Leave blank for 1.">
      <span>Step</span>
      <input type="number" class="text_pole strk-fdet-step" min="0" />
    </label>
    <label class="strk-fdet-row strk-fdet-number-only" title="Allow ±delta commands (DELTA subject tracker.field ±N) for this field. If unchecked, only SET is allowed.">
      <input type="checkbox" class="strk-fdet-allow-delta" />
      <span>Allow delta (±N)</span>
    </label>
    <label class="strk-fdet-row strk-fdet-number-only" title="If set to the ID of another number field in this tracker, this field is rendered/injected as 'value/that-field-value' (e.g. health paired with health_max → '120/125'). Leave blank for a standalone number.">
      <span>Max from field</span>
      <input type="text" class="text_pole strk-fdet-max-from-field" placeholder="e.g. health_max (another field's ID)" />
    </label>
  </div>

  <!-- Inclusion section -->
  <div class="strk-fdet-section">
    <h5>Inclusion</h5>
    <label class="strk-fdet-row" title="When this field is included in the AI auto-update prompt. always = every turn. active = only if touched within activeWindow turns. tag = only when a scene tag matches. manual = never auto, only via /tracker-include.">
      <span>Rule</span>
      <select class="text_pole strk-fdet-incl-rule">
        <option value="always">always</option>
        <option value="active">active</option>
        <option value="tag">tag</option>
        <option value="manual">manual</option>
      </select>
    </label>
    <label class="strk-fdet-row strk-fdet-incl-tag-only" title="Comma-separated scene tag names. Field is included in the prompt only when at least one of these tags is active.">
      <span>Tags</span>
      <input type="text" class="text_pole strk-fdet-incl-tags" placeholder="e.g. intimate, combat" />
    </label>
    <label class="strk-fdet-row strk-fdet-incl-active-only" title="Number of recent committed assistant messages to look back when checking whether this field was recently touched. Default: 5.">
      <span>Active window</span>
      <input type="number" class="text_pole strk-fdet-incl-active-window" min="1" value="5" />
    </label>
  </div>

  <div class="strk-fdet-actions">
    <button class="menu_button strk-fdet-save">Save</button>
    <button class="menu_button strk-fdet-cancel">Cancel</button>
  </div>
</div>
