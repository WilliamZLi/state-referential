<div id="strk-panel" class="strk-panel strk-hidden">
  <div class="strk-panel-header" id="strk-panel-drag-handle">
    <span class="strk-panel-title">State Tracker</span>
    <span class="strk-panel-spinner strk-hidden" title=""></span>
    <button class="strk-panel-close" title="Close">×</button>
  </div>
  <div class="strk-scene-tag-strip" id="strk-scene-tags"></div>
  <div class="strk-subject-bar">
    <select class="text_pole strk-subject-select" id="strk-subject-select"></select>
    <button class="menu_button strk-add-subject" id="strk-add-subject" title="Add subject">+ subject</button>
    <button class="menu_button strk-rename-subject" id="strk-rename-subject" title="Rename current subject">✎</button>
    <button class="menu_button strk-remove-subject strk-danger" id="strk-remove-subject" title="Remove current subject (values are wiped)">−</button>
  </div>
  <div class="strk-tabs" id="strk-tabs"></div>
  <div class="strk-tab-body" id="strk-tab-body"></div>
  <div class="strk-panel-footer">
    <button class="menu_button strk-probe-btn" id="strk-probe-btn">Probe this tracker</button>
    <button class="menu_button strk-reset-btn" id="strk-reset-btn">Reset to defaults</button>
  </div>
</div>
