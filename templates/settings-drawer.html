<div class="strk-drawer inline-drawer">
  <div class="inline-drawer-toggle inline-drawer-header">
    <b>State Tracker</b>
    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
  </div>
  <div class="inline-drawer-content">
    <label title="Master on/off for the entire extension. Disables auto-update, probes, injection, and macros if off."><input type="checkbox" id="strk-enable" /> Enable plugin</label>
    <label title="Master toggle for AI auto-update after each assistant message. Individual trackers can also have their own auto-update flag in the schema editor."><input type="checkbox" id="strk-auto-update" checked /> Auto-update master</label>
    <label title="Master toggle for description probes (the AI generating prose blurbs for new field values). Cache hits never re-probe regardless."><input type="checkbox" id="strk-probe-desc" checked /> Description probe master</label>
    <label title="Default value for fields with inclusion rule 'active'. Larger = more verbose prompts. Smaller = stale fields drop off the auto-update prompt sooner.">Active window (turns) <input type="number" class="text_pole" id="strk-active-window" min="1" max="50" value="5" /></label>
    <h4>Tracker definitions</h4>
    <div id="strk-defs-list"></div>
    <div class="strk-drawer-actions">
      <button class="menu_button" id="strk-new-tracker">+ New tracker</button>
      <button class="menu_button" id="strk-import-json">Import JSON</button>
      <button class="menu_button" id="strk-install-presets">Install / update default presets</button>
      <button class="menu_button" id="strk-uninstall-presets">Uninstall presets</button>
    </div>
    <h4>Default scene tags</h4>
    <div id="strk-default-tags"></div>
    <div class="strk-drawer-actions">
      <button class="menu_button" id="strk-add-default-tag">+ Add default tag</button>
    </div>
    <div class="strk-hidden">
      <h4>Storage backend</h4>
      <select class="text_pole" id="strk-backend"><option value="chat-scoped">Chat-scoped (default)</option></select>
    </div>
    <h4>Templates</h4>
    <label>Auto-update prompt template</label>
    <textarea class="text_pole" id="strk-tpl-autoupdate" rows="6"></textarea>
    <label>Description probe template</label>
    <textarea class="text_pole" id="strk-tpl-probe" rows="6"></textarea>
    <div class="strk-drawer-actions">
      <button class="menu_button" id="strk-reset-tpls">Reset templates</button>
    </div>
    <hr/>
    <div class="strk-drawer-actions">
      <button class="menu_button" id="strk-cleanup-desc">Cleanup orphan descriptions</button>
      <button class="menu_button strk-danger" id="strk-reset-state">Reset all state for current chat</button>
    </div>
    <div class="strk-section">
      <h4>Worlds (Layer 2)</h4>
      <label title="Show the binding prompt when starting a new chat, asking whether to bind it to a World.">
        <input type="checkbox" id="strk-world-prompt-enabled" checked /> Show binding prompt on new chats
      </label>
      <div id="strk-world-defaults">
        <span>Default chronicle config for new Worlds:</span>
        <label>Verbatim window <input type="number" class="text_pole" id="strk-world-default-window" min="1" value="5" /></label>
        <label>Update strategy
          <select class="text_pole" id="strk-world-default-strategy">
            <option value="lazy">lazy</option>
            <option value="eager">eager</option>
            <option value="manual">manual</option>
          </select>
        </label>
        <label>Big picture token cap <input type="number" class="text_pole" id="strk-world-default-bp-cap" min="50" value="300" /></label>
        <label>Entry token cap <input type="number" class="text_pole" id="strk-world-default-entry-cap" min="50" value="200" /></label>
      </div>
    </div>
  </div>
</div>
