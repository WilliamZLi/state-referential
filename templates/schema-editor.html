<div class="strk-schema-editor">
  <div class="strk-schema-meta">
    <label>ID <input type="text" class="text_pole" id="strk-schema-id" /></label>
    <label>Label <input type="text" class="text_pole" id="strk-schema-label" /></label>
    <fieldset class="strk-roles-fieldset">
      <legend>Roles</legend>
      <label><input type="checkbox" class="strk-role-cb" value="protagonist" /> protagonist</label>
      <label><input type="checkbox" class="strk-role-cb" value="npc" /> npc</label>
      <label><input type="checkbox" class="strk-role-cb" value="location" /> location</label>
      <label><input type="checkbox" class="strk-role-cb" value="faction" /> faction</label>
      <label><input type="checkbox" class="strk-role-cb" value="object" /> object</label>
    </fieldset>
    <label><input type="checkbox" id="strk-schema-autoupdate" /> Auto-update</label>
  </div>
  <h4>Fields</h4>
  <table class="strk-fields-table">
    <thead><tr><th>ID</th><th>Label</th><th>Type</th><th>Describable</th><th>Scope</th><th>Inclusion</th><th>Injection</th><th></th></tr></thead>
    <tbody id="strk-fields-body"></tbody>
  </table>
  <div class="strk-schema-actions">
    <button class="menu_button" id="strk-add-field">+ field</button>
    <button class="menu_button" id="strk-schema-save">Save</button>
    <button class="menu_button" id="strk-schema-export">Export JSON</button>
    <button class="menu_button" id="strk-schema-reset">Reset to preset default</button>
    <button class="menu_button" id="strk-schema-cancel">Cancel</button>
  </div>
</div>
