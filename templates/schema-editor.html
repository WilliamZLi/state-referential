<div class="strk-schema-editor">
  <div class="strk-schema-meta">
    <label title="Stable machine ID for the tracker (used in macros and storage). Lowercase, no spaces. Example: outfit">ID <input type="text" class="text_pole" id="strk-schema-id" /></label>
    <label title="Human-readable tracker name shown as the tab in the panel. Example: Outfit">Label <input type="text" class="text_pole" id="strk-schema-label" /></label>
    <fieldset class="strk-roles-fieldset" title="Which subject roles this tracker attaches to. Subjects with non-listed roles won't see this tracker. Most NPCs need 'npc'; protagonist-only stuff (e.g. unique magic) needs only 'protagonist'.">
      <legend>Roles</legend>
      <label><input type="checkbox" class="strk-role-cb" value="protagonist" /> protagonist</label>
      <label><input type="checkbox" class="strk-role-cb" value="npc" /> npc</label>
      <label><input type="checkbox" class="strk-role-cb" value="location" /> location</label>
      <label><input type="checkbox" class="strk-role-cb" value="faction" /> faction</label>
      <label><input type="checkbox" class="strk-role-cb" value="object" /> object</label>
    </fieldset>
    <label title="Whether the AI should automatically check for changes to this tracker's fields after each assistant message. Turn off for trackers that only change via manual edits or slash commands (e.g. traits)."><input type="checkbox" id="strk-schema-autoupdate" /> Auto-update</label>
  </div>
  <h4>Fields</h4>
  <table class="strk-fields-table">
    <thead><tr>
      <th title="Stable machine ID for this field (used in macros, slash commands, and stored data). Lowercase, no spaces. Example: topwear">ID</th>
      <th title="Human-readable name shown in the panel UI. Example: Topwear">Label</th>
      <th title="Data type. text/number/enum/list/prose. Number needs min+max; enum needs options.">Type</th>
      <th title="Whether the AI should generate a prose description of the value (for visual consistency when re-encountered). Recommended for outfit slots, moods, items, etc.; not for numbers.">Describable</th>
      <th title="Where the cached description lives. per-subject: each subject gets their own prose (Lyra's 'red dress' looks different from Maya's). global: one prose for everyone (a sword looks the same to anyone).">Scope</th>
      <th title="When this field is included in the AI auto-update prompt. always = every turn. active = only if touched in last N turns (saves tokens, lets temporary effects fade). tag = only when a scene tag is active. manual = never auto, only via /tracker-include once.">Inclusion</th>
      <th title="Whether this field's value is injected into the AI's generation prompt (so the AI 'sees' the current state when writing the next reply). Toggle to inject; configure trigger/position/depth in the field's injection block.">Injection</th>
      <th></th>
    </tr></thead>
    <tbody id="strk-fields-body"></tbody>
  </table>
  <div class="strk-schema-actions">
    <button class="menu_button" id="strk-add-field">+ field</button>
    <button class="menu_button" id="strk-schema-save">Save</button>
    <button class="menu_button" id="strk-schema-export">Export JSON</button>
    <button class="menu_button" id="strk-schema-reset">Reset to preset default</button>
    <button class="menu_button" id="strk-schema-cancel">Cancel</button>
  </div>
</div>
